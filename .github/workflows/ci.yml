name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web-build:
    name: Web Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc -b --noEmit

      - name: Build
        run: npm run build

  server-build:
    name: Server Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  dev-startup:
    name: Dev Startup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Start dev servers and verify readiness
        env:
          OPENROUTER_API_KEY: ci-placeholder
          DATA_DIR: ./server/data
        run: |
          set -euo pipefail

          npm run dev > /tmp/storybook-dev.log 2>&1 &
          DEV_PID=$!

          cleanup() {
            if kill -0 "$DEV_PID" 2>/dev/null; then
              kill "$DEV_PID"
              wait "$DEV_PID" || true
            fi
          }
          trap cleanup EXIT

          timeout 90 bash -lc 'until curl -fsS http://127.0.0.1:3000/api/healthz | grep -q "\"status\":\"ok\""; do sleep 2; done'
          timeout 90 bash -lc 'until curl -fsS http://127.0.0.1:5173 | grep -qi "<!doctype html>"; do sleep 2; done'
          curl -fsS http://127.0.0.1:5173/api/healthz | grep -q '"status":"ok"'

      - name: Show dev logs on failure
        if: failure()
        run: cat /tmp/storybook-dev.log

  android-build:
    name: Android Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "SYNC_API_URL=https://ci-placeholder.example.com" >> local.properties

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Run lint
        run: ./gradlew lint --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 7
