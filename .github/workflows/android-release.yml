name: Android Release

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: "Version name (e.g. 1.2.0)"
        required: true
      version_code:
        description: "Version code (integer, must increment each release)"
        required: true

jobs:
  build-release:
    name: Build & Release APK
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Set version
        run: |
          sed -i "s/versionCode = .*/versionCode = ${{ inputs.version_code }}/" app/build.gradle.kts
          sed -i "s/versionName = .*/versionName = \"${{ inputs.version_name }}\"/" app/build.gradle.kts

      - name: Build release APK
        run: ./gradlew assembleRelease --no-daemon

      - name: Rename APK
        run: |
          mv app/build/outputs/apk/release/app-release-unsigned.apk \
             app/build/outputs/apk/release/storybook-v${{ inputs.version_name }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version_name }}
          name: Storybook v${{ inputs.version_name }}
          body: |
            ## Storybook Android v${{ inputs.version_name }}

            ### Install
            1. Download `storybook-v${{ inputs.version_name }}.apk` below
            2. Transfer to your phone and open to install (enable "Install from unknown sources" if prompted)
            3. Open the app and enter your Storybook server URL to connect

            ### What's included
            - Connect to any Storybook server instance
            - Supports both standalone (password) and gool3yhost (API key) authentication
            - Offline-first with background sync every 15 minutes
          files: android/app/build/outputs/apk/release/storybook-v${{ inputs.version_name }}.apk
          draft: false
          prerelease: false
          generate_release_notes: true
