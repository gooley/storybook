name: Deploy

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  ECR_URI: 943179516876.dkr.ecr.us-east-1.amazonaws.com/gool3yhost

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::943179516876:role/gool3yhost-github-actions
          aws-region: us-east-1

      - name: Login to ECR
        run: aws ecr get-login-password | docker login --username AWS --password-stdin $ECR_URI

      - name: Build and push
        run: |
          docker build -t $ECR_URI:storybook-${{ github.sha }} .
          docker push $ECR_URI:storybook-${{ github.sha }}

      - name: Deploy via SSM
        run: |
          aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --targets '[{"Key":"tag:gool3yhost","Values":["true"]}]' \
            --parameters 'commands=["cd /opt/gool3yhost/apps/storybook && IMAGE_TAG=${{ github.sha }} docker compose pull && IMAGE_TAG=${{ github.sha }} docker compose up -d"]' \
            --region us-east-1
