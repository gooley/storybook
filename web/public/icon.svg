<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#5a7d4f"/>
      <stop offset="100%" stop-color="#3a5234"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Open book -->
  <g transform="translate(256, 276)">
    <!-- Left page -->
    <path d="M-16,-110 C-60,-120 -140,-125 -165,-108 L-165,75 C-140,58 -60,62 -16,72 Z" fill="#fff" opacity="0.92"/>
    <!-- Right page -->
    <path d="M16,-110 C60,-120 140,-125 165,-108 L165,75 C140,58 60,62 16,72 Z" fill="#fff" opacity="0.92"/>
    <!-- Spine shadow -->
    <path d="M-16,-110 C-6,-102 6,-102 16,-110 L16,72 C6,80 -6,80 -16,72 Z" fill="#fff" opacity="0.72"/>
    <!-- Left page lines -->
    <line x1="-135" y1="-65" x2="-40" y2="-58" stroke="#4a6741" stroke-width="4" stroke-linecap="round" opacity="0.18"/>
    <line x1="-135" y1="-35" x2="-40" y2="-28" stroke="#4a6741" stroke-width="4" stroke-linecap="round" opacity="0.18"/>
    <line x1="-135" y1="-5" x2="-40" y2="2" stroke="#4a6741" stroke-width="4" stroke-linecap="round" opacity="0.18"/>
    <line x1="-135" y1="25" x2="-40" y2="32" stroke="#4a6741" stroke-width="4" stroke-linecap="round" opacity="0.18"/>
    <!-- Right page lines -->
    <line x1="40" y1="-58" x2="135" y2="-65" stroke="#4a6741" stroke-width="4" stroke-linecap="round" opacity="0.18"/>
    <line x1="40" y1="-28" x2="135" y2="-35" stroke="#4a6741" stroke-width="4" stroke-linecap="round" opacity="0.18"/>
    <line x1="40" y1="2" x2="135" y2="-5" stroke="#4a6741" stroke-width="4" stroke-linecap="round" opacity="0.18"/>
    <line x1="40" y1="32" x2="135" y2="25" stroke="#4a6741" stroke-width="4" stroke-linecap="round" opacity="0.18"/>
  </g>
  <!-- Sparkle large -->
  <path d="M370,130 L378,152 L400,160 L378,168 L370,190 L362,168 L340,160 L362,152 Z" fill="#fff" opacity="0.9"/>
  <!-- Sparkle small -->
  <path d="M405,195 L409,207 L421,211 L409,215 L405,227 L401,215 L389,211 L401,207 Z" fill="#fff" opacity="0.6"/>
  <!-- Sparkle tiny -->
  <path d="M345,105 L348,113 L356,116 L348,119 L345,127 L342,119 L334,116 L342,113 Z" fill="#fff" opacity="0.5"/>
</svg>
